<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STURNUS — Dashboard</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Theme pre-loader: runs before first paint to prevent flash -->
  <link id="theme-css" rel="stylesheet" href="">
  <script>(function(){try{var d=(window.location.hostname.includes("vhs")||window.location.hostname.endsWith("bekind.support"))?"vhs":"sturnus";var t=localStorage.getItem("lastTheme")||d;if(t==="vhs")document.getElementById("theme-css").href="css/theme-vhs.css";document.documentElement.dataset.themeLoading="1";var fi=document.createElement("link");fi.rel="icon";fi.type="image/svg+xml";fi.href=t==="vhs"?"favicon-vhs.svg":"favicon-sturnus.svg";document.head.appendChild(fi);}catch(e){}})()</script>
  <script src="js/faro.js"></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-icon-wrap"><svg class="nav-brand-icon" viewBox="0 0 20 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="0" width="5" height="1"/><rect x="4" y="1" width="7" height="1"/><rect x="2" y="2" width="5" height="1"/><rect x="8" y="2" width="4" height="1"/><rect x="1" y="3" width="12" height="1"/><rect x="2" y="4" width="14" height="1"/><rect x="3" y="5" width="15" height="1"/><rect x="4" y="6" width="15" height="1"/><rect x="4" y="7" width="15" height="1"/><rect x="4" y="8" width="12" height="1"/><rect x="5" y="9" width="7" height="1"/><rect x="6" y="10" width="5" height="1"/><rect x="7" y="11" width="1" height="1"/><rect x="10" y="11" width="1" height="1"/><rect x="7" y="12" width="1" height="1"/><rect x="10" y="12" width="1" height="1"/><rect x="6" y="13" width="3" height="1"/><rect x="10" y="13" width="2" height="1"/></svg></span>
    <span class="nav-brand-name">STURNUS</span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-info">
    <span class="nav-handle" id="nav-handle">…</span>
    <span class="nav-dot">·</span>
    <span class="nav-score" id="nav-score">0 pts</span>
  </div>
  <a href="admin.html" class="nav-link admin-link" id="nav-admin" style="display:none">Admin</a>
  <button class="nav-link" id="nav-logout">Sign out</button>
</nav>

<!-- Mobile warning (hidden on desktop via CSS) -->
<div id="mobile-warning" style="display:none;background:var(--warning-bg);border-bottom:1px solid var(--text-warning);padding:10px 16px;font-size:12px;color:var(--text-warning);text-align:center;letter-spacing:0.5px;">
  ⚠ Best experienced on desktop — challenges include a MongoDB terminal and log viewer.
</div>
<style>@media(max-width:700px){#mobile-warning{display:block!important;}}</style>

<!-- Content -->
<div class="container">
  <div class="page-header">
    <h1>Challenges</h1>
    <p>Work through each ticket. Earn points for correct answers — hints cost points.</p>
  </div>

  <div class="two-col">
    <!-- Challenge list -->
    <div>
      <div id="challenges-loading" class="loading-state">
        <div class="spinner"></div> Loading challenges…
      </div>

      <!-- Sort + counts -->
      <div id="challenge-controls" class="hidden" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span class="text-muted text-sm">Sort:</span>
        <button class="btn btn-ghost btn-sm sort-btn active" data-sort="id">By ID</button>
        <button class="btn btn-ghost btn-sm sort-btn" data-sort="points">By Points</button>
        <span class="text-muted text-sm" style="margin-left:auto;" id="ch-summary"></span>
      </div>

      <!-- Tag filter pills -->
      <div id="tag-filter-bar" class="hidden" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;">
        <span class="text-muted text-sm" style="flex-shrink:0;">Filter:</span>
        <div id="tag-pills" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
      </div>

      <!-- Unsolved -->
      <div id="unsolved-section">
        <div class="section-label" id="unsolved-label"></div>
        <div class="challenge-list" id="unsolved-list"></div>
      </div>

      <!-- Solved -->
      <div id="solved-section" class="hidden">
        <div class="section-label" style="margin-top:20px;" id="solved-label"></div>
        <div class="challenge-list" id="solved-list"></div>
      </div>

      <div id="no-challenges" class="hidden" style="padding:40px 0;text-align:center;color:var(--text-muted);">
        No active challenges yet. Check back soon.
      </div>
    </div>

    <!-- Leaderboard -->
    <div>
      <div class="card">
        <div class="card-header">
          <h2>Score Registry</h2>
          <span class="text-muted text-sm" id="lb-count"></span>
        </div>
        <div id="lb-loading" class="loading-state">
          <div class="spinner"></div>
        </div>
        <div class="leaderboard" id="leaderboard"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/themes.js"></script>
<script src="js/auth.js"></script>
<script>
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

(async () => {
  const ctx = await Auth.requireAuth();
  if (!ctx) return;

  Auth.populateNav(ctx.profile);

  // ── Load challenges + submissions in parallel ───────────────────────────────
  const [challengesRes, submissionsRes] = await Promise.all([
    _supabase
      .from('challenges')
      .select('id, title, questions, variant_group, active, tags')
      .eq('active', true)
      .order('created_at', { ascending: true }),
    _supabase
      .from('submissions')
      .select('challenge_id, score_earned, hints_cost, first_blood, completed_at, difficulty_rating')
      .eq('user_id', ctx.user.id)
  ]);

  const allChallenges = challengesRes.data  || [];
  const submissions   = submissionsRes.data || [];
  const REVIEW_DAYS   = 90;

  // Submission lookup: challenge_id → most recent submission
  const subById = {};
  submissions.forEach(s => {
    if (!subById[s.challenge_id] || new Date(s.completed_at) > new Date(subById[s.challenge_id].completed_at)) {
      subById[s.challenge_id] = s;
    }
  });

  // ── Variant rotation ────────────────────────────────────────────────────────
  const challenges = [];
  const groups = {};
  allChallenges.forEach(ch => {
    if (ch.variant_group) {
      if (!groups[ch.variant_group]) groups[ch.variant_group] = [];
      groups[ch.variant_group].push(ch);
    } else {
      challenges.push(ch);
    }
  });

  Object.values(groups).forEach(variants => {
    const done   = variants.filter(ch =>  subById[ch.id]);
    const unseen = variants.filter(ch => !subById[ch.id]);
    challenges.push(...done);
    if (unseen.length === 0) return;
    const groupSubs = done.map(ch => subById[ch.id])
      .sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at));
    if (groupSubs.length === 0) { challenges.push(unseen[0]); return; }
    const daysSince = (Date.now() - new Date(groupSubs[0].completed_at)) / 86400000;
    if (daysSince < REVIEW_DAYS) return;
    challenges.push({ ...unseen[0], _isReview: true });
  });

  challenges.sort((a, b) => a.id.localeCompare(b.id));

  const doneIds = new Set(submissions.map(s => s.challenge_id));

  document.getElementById('challenges-loading').style.display = 'none';

  if (!challenges.length) {
    document.getElementById('no-challenges').classList.remove('hidden');
  } else {
    document.getElementById('challenge-controls').classList.remove('hidden');
    document.getElementById('challenge-controls').style.display = 'flex';

    // ── Tag filter ────────────────────────────────────────────────────────────
    const allTags = [...new Set(allChallenges.flatMap(ch => ch.tags || []))].sort();
    let activeTag = null;

    if (allTags.length) {
      const bar  = document.getElementById('tag-filter-bar');
      const pills = document.getElementById('tag-pills');
      bar.classList.remove('hidden');
      bar.style.display = 'flex';

      function renderTagPills() {
        pills.innerHTML = '';
        allTags.forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-ghost btn-sm tag-filter-pill';
          btn.style.cssText = `
            font-family: var(--font-mono); font-size: 10px; padding: 2px 8px; border-radius: 20px;
            border: 1px solid ${activeTag === tag ? 'var(--text-link)' : 'var(--border)'};
            color: ${activeTag === tag ? 'var(--text-link)' : 'var(--text-muted)'};
            background: ${activeTag === tag ? 'var(--accent-subtle)' : 'none'};
          `;
          btn.textContent = tag;
          btn.addEventListener('click', () => {
            activeTag = activeTag === tag ? null : tag;
            renderTagPills();
            renderChallenges();
          });
          pills.appendChild(btn);
        });
      }
      renderTagPills();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    let sortMode = 'id';

    function totalPts(ch) {
      return (ch.questions || []).reduce((s, q) => s + (q.points || 0), 0);
    }

    const STAR_LABELS = ['','Very easy','Easy','About right','Hard','Very hard'];

    function starsHtml(rating) {
      if (!rating) return '';
      const filled = '★'.repeat(rating);
      const empty  = '☆'.repeat(5 - rating);
      return `<span title="${STAR_LABELS[rating]}" style="color:var(--text-warning);font-size:11px;letter-spacing:1px;">${filled}${empty}</span>`;
    }

    function tagsHtml(tags) {
      if (!tags || !tags.length) return '';
      return tags.map(t =>
        `<button class="inline-tag-pill" data-tag="${escHtml(t)}" style="
          font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:20px;
          border:1px solid var(--border);color:var(--text-muted);background:none;cursor:pointer;
          ${activeTag === t ? 'border-color:var(--text-link);color:var(--text-link);' : ''}
        ">${escHtml(t)}</button>`
      ).join('');
    }

    function makeCard(ch) {
      const done = doneIds.has(ch.id);
      const pts  = totalPts(ch);
      const sub  = subById[ch.id] || {};
      const card = document.createElement('a');
      card.href      = `challenge.html?id=${encodeURIComponent(ch.id)}`;
      card.className = `challenge-card${done ? ' completed' : ''}`;

      const tagsRow = (ch.tags && ch.tags.length)
        ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;">${tagsHtml(ch.tags)}</div>`
        : '';

      const diffRow = (done && sub.difficulty_rating)
        ? `<div style="margin-top:4px;">${starsHtml(sub.difficulty_rating)}</div>`
        : '';

      card.innerHTML = `
        <span class="challenge-card-id">${escHtml(ch.id)}</span>
        <div class="challenge-card-info">
          <div class="challenge-card-title">${escHtml(ch.title)}</div>
          <div class="challenge-card-meta">${pts} pts · ${(ch.questions||[]).length} question${(ch.questions||[]).length!==1?'s':''}</div>
          ${tagsRow}${diffRow}
        </div>
        <div class="challenge-card-right">
          ${done ? (() => {
            const badges = ['<span class="badge badge-success">✓ Solved</span>'];
            if (sub.first_blood) badges.push('<span class="badge badge-warning" title="First to solve this case"><i class="ti ti-antenna" style="font-size:10px;" aria-hidden="true"></i> Initial Response</span>');
            if (sub.hints_cost === 0) badges.push('<span class="badge badge-blue" title="No hints used">Hint-free</span>');
            return badges.join('');
          })() : ch._isReview
            ? '<span class="badge badge-warning">Review</span>'
            : '<span class="badge badge-muted">Unsolved</span>'
          }
          <span class="pts-badge">${pts} pts</span>
        </div>
      `;

      // Inline tag pills should filter, not navigate
      card.querySelectorAll('.inline-tag-pill').forEach(pill => {
        pill.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          activeTag = activeTag === pill.dataset.tag ? null : pill.dataset.tag;
          if (typeof renderTagPills === 'function') renderTagPills();
          renderChallenges();
        });
      });

      return card;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderChallenges() {
      let visible = [...challenges];

      // Tag filter
      if (activeTag) {
        visible = visible.filter(ch => (ch.tags || []).includes(activeTag));
      }

      // Sort
      visible.sort((a, b) => {
        if (sortMode === 'points') return totalPts(b) - totalPts(a);
        return a.id.localeCompare(b.id);
      });

      const unsolved = visible.filter(ch => !doneIds.has(ch.id));
      const solved   = visible.filter(ch =>  doneIds.has(ch.id));

      // Summary — show filter context
      const summaryEl = document.getElementById('ch-summary');
      const totalSolved = challenges.filter(ch => doneIds.has(ch.id)).length;
      summaryEl.textContent = activeTag
        ? `${visible.length} matching "${activeTag}" · ${totalSolved}/${challenges.length} solved`
        : `${totalSolved}/${challenges.length} solved`;

      const unsolvedList  = document.getElementById('unsolved-list');
      const unsolvedLabel = document.getElementById('unsolved-label');
      unsolvedLabel.textContent = unsolved.length ? `Unsolved — ${unsolved.length}` : '';
      unsolvedList.innerHTML = '';
      unsolved.forEach(ch => unsolvedList.appendChild(makeCard(ch)));

      const solvedSection = document.getElementById('solved-section');
      const solvedList    = document.getElementById('solved-list');
      const solvedLabel   = document.getElementById('solved-label');
      if (solved.length) {
        solvedSection.classList.remove('hidden');
        solvedLabel.textContent = `Solved — ${solved.length}`;
        solvedList.innerHTML = '';
        solved.forEach(ch => solvedList.appendChild(makeCard(ch)));
      } else {
        solvedSection.classList.add('hidden');
      }
    }

    renderChallenges();

    // Sort buttons
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sortMode = btn.dataset.sort;
        document.querySelectorAll('.sort-btn').forEach(b =>
          b.classList.toggle('active', b === btn));
        renderChallenges();
      });
    });
  }

  // ── Leaderboard ─────────────────────────────────────────────────────────────
  const { data: lb } = await _supabase
    .from('profiles')
    .select('id, handle, score')
    .eq('theme', ctx.profile.theme)
    .neq('role', 'admin')
    .order('score', { ascending: false })
    .limit(20);

  document.getElementById('lb-loading').style.display = 'none';

  const lbEl = document.getElementById('leaderboard');
  if (!lb || !lb.length) {
    lbEl.innerHTML = '<div class="loading-state text-muted">No scores yet.</div>';
  } else {
    document.getElementById('lb-count').textContent = lb.length + ' players';
    lb.forEach((entry, i) => {
      const rank = i + 1;
      const isMe = entry.id === ctx.user.id;
      const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
      const row = document.createElement('div');
      row.className = `leaderboard-row${isMe ? ' me' : ''}`;
      row.innerHTML = `
        <span class="lb-rank ${rankClass}">${rank}</span>
        <span class="lb-handle${isMe ? ' me' : ''}">${escHtml(entry.handle)}</span>
        <span class="lb-score">${entry.score.toLocaleString()}</span>
      `;
      lbEl.appendChild(row);
    });
  }
})();
</script>
</body>
</html>
